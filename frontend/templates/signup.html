<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - StitchFlow</title>
    <link rel="stylesheet" href="/static/styles.css?v=1.0.2">
</head>
<body>
    <div id="messageContainer"></div>
    <div class="auth-wrapper">
        <div class="auth-container">
            <h1>StitchFlow</h1>
            <h2>Create Account</h2>
            <form class="auth-form" action="/api/signup" method="post">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="/login" class="auth-switch-link">Login</a></p>
        </div>
    </div>
</body>
</html>
