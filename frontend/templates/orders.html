<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StitchFlow Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Order Card Styles */
        .order-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #EDE2DF;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .order-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(26, 74, 92, 0.15);
        }
        .order-card.expanded {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            cursor: default;
            animation: expandModal 0.3s ease;
        }
        @keyframes expandModal {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .order-card.expanded .details {
            max-height: none;
        }
        .order-card.expanded .measurements-full {
            display: block;
        }
        .order-card.expanded .measurements-short {
            display: none;
        }
        .overlay-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: none;
            backdrop-filter: blur(5px);
        }
        .overlay-dark.active {
            display: block;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .order-number {
            background: linear-gradient(135deg, #1A4A5C, #2A6A82);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-inprogress {
            background: #FFF3CD;
            color: #856404;
            border: 1px solid #FFC107;
        }
        .status-completed {
            background: #D4EDDA;
            color: #155724;
            border: 1px solid #28A745;
        }
        .measurements-short {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            color: #1A4A5C;
        }
        .measurements-short:hover {
            background: #e9ecef;
        }
        .measurements-full {
            display: none;
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
        }
        .measurement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .measurement-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: white;
            border-radius: 10px;
            border: 1px solid #EDE2DF;
        }
        .measurement-item strong {
            color: #1A4A5C;
        }
        .expand-hint {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
            color: #999;
        }
        .close-expand {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            display: none;
        }
        .order-card.expanded .close-expand {
            display: block;
        }
        
        /* Delete Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .modal-container {
            background: white;
            border-radius: 32px;
            max-width: 450px;
            width: 90%;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid #EDE2DF;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            background: linear-gradient(135deg, #f8f9fa, white);
        }
        .modal-header h2 {
            margin: 0;
            color: #3B82F6;
            font-size: 1.3rem;
        }
        .modal-close {
            position: absolute;
            right: 20px;
            top: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }
        .modal-close:hover {
            color: #dc3545;
        }
        .modal-body {
            padding: 24px;
            text-align: center;
        }
        .modal-body p {
            margin: 8px 0;
            color: #5B6E6B;
        }
        .modal-footer {
            padding: 20px 24px 24px;
            border-top: 1px solid #EDE2DF;
            display: flex;
            gap: 15px;
        }
        .modal-footer .btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        /* New Order Highlight Animation */
        @keyframes highlightNew {
            0% {
                background-color: rgba(26, 74, 92, 0.2);
                transform: scale(1);
            }
            50% {
                background-color: rgba(26, 74, 92, 0.4);
                transform: scale(1.01);
            }
            100% {
                background-color: white;
                transform: scale(1);
            }
        }
        .order-card.new-order {
            animation: highlightNew 1.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button id="menuBtn" class="menu-btn"><i class="fas fa-bars"></i></button>
        <div class="logo-text" style="font-weight: 700; color: #1A4A5C; font-size: 1.2rem;">StitchFlow</div>
        <div style="width: 40px;"></div>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="overlayDark" class="overlay-dark"></div>

    <div id="drawer" class="drawer">
        <div class="drawer-header">
            <h2 style="font-size: 1.5rem; color: white;">StitchFlow</h2>
            <span id="closeDrawer" class="close-btn">&times;</span>
        </div>
        <nav class="drawer-nav">
            <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/orders-page" class="active"><i class="fas fa-clipboard-list"></i> Orders</a>
            <a href="/reminders"><i class="fas fa-bell"></i> Reminders</a>
            <a href="/profile"><i class="fas fa-user"></i> Profile</a>
            <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="container">
        <div id="messageContainer"></div>
        <h1 class="orders-page-title">📋 All Orders</h1>
        
        <!-- Stats Summary -->
        <div style="display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap;">
            <div style="background: linear-gradient(135deg, #1A4A5C, #2A6A82); padding: 15px 25px; border-radius: 16px; color: white;">
                <strong>Total Orders:</strong> <span id="totalOrdersCount">0</span>
            </div>
            <div style="background: #FF6B9D; padding: 15px 25px; border-radius: 16px; color: white;">
                <strong>In Progress:</strong> <span id="inProgressCount">0</span>
            </div>
            <div style="background: #28A745; padding: 15px 25px; border-radius: 16px; color: white;">
                <strong>Completed:</strong> <span id="completedCount">0</span>
            </div>
        </div>
        
        <div id="ordersList" class="orders-grid">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading orders...</div>
        </div>
    </div>

    <!-- Edit Order Modal -->
    <div id="editModal" class="popup-overlay" style="display: none;">
        <div class="popup-container">
            <div class="popup-header">
                <h2>✏️ Edit Order</h2>
                <button class="popup-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="popup-body">
                <div class="form-group">
                    <label>👤 Customer Name</label>
                    <input type="text" id="editCustomer" class="form-control" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #EDE2DF;">
                </div>
                <div class="form-group">
                    <label>📞 Phone Number</label>
                    <input type="tel" id="editPhone" class="form-control" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #EDE2DF;">
                </div>
                <div class="form-group">
                    <label>📅 Due Date</label>
                    <input type="date" id="editDueDate" class="form-control" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #EDE2DF;" min="">
                </div>
                <div class="form-group">
                    <label>📏 Measurements</label>
                    <textarea id="editMeasurements" rows="4" class="form-control" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #EDE2DF;"></textarea>
                </div>
                <div class="form-group">
                    <label>📋 Order Status</label>
                    <select id="editStatus" class="form-control" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #EDE2DF;">
                        <option value="inprogress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>
            <div class="popup-footer">
                <button class="btn btn-primary" onclick="saveEditOrder()">💾 Save Changes</button>
                <button class="btn" style="background: #ccc;" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <i class="fas fa-trash-alt" style="font-size: 1.5rem; color: #dc3545;"></i>
                <h2>Delete Order</h2>
                <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
            </div>
            <div class="modal-body">
                <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #dc3545; margin-bottom: 15px;"></i>
                <p>Are you sure you want to delete <strong id="deleteOrderName">this order</strong>?</p>
                <p style="font-size: 14px; color: #999;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete Order</button>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <span class="close-btn" style="position: absolute; top: 20px; right: 30px; color: white; font-size: 30px; cursor: pointer;">&times;</span>
        <img class="modal-content" id="enlargedImg">
    </div>

    <script>
        let currentEditOrderId = null;
        let currentDeleteOrderId = null;
        let currentDeleteDisplayNumber = null;
        let currentDeleteOrderName = null;
        let allOrders = [];

        // Set min date for date picker
        const today = new Date().toISOString().split('T')[0];
        
        function setMinDateOnDateInputs() {
            const dateInputs = document.querySelectorAll('input[type="date"]');
            dateInputs.forEach(input => {
                if (!input.hasAttribute('min')) {
                    input.setAttribute('min', today);
                }
            });
        }

        // Drawer Logic
        const menuBtn = document.getElementById('menuBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const closeDrawer = document.getElementById('closeDrawer');
        
        function hideDrawer() {
            drawer.classList.remove('open');
            overlay.classList.remove('active');
        }
        if (menuBtn) menuBtn.addEventListener('click', () => {
            drawer.classList.add('open');
            overlay.classList.add('active');
        });
        if (overlay) overlay.addEventListener('click', hideDrawer);
        if (closeDrawer) closeDrawer.addEventListener('click', hideDrawer);

        function displayMessage(message, type) {
            const container = document.getElementById('messageContainer');
            if (!container) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = `alert alert-${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            msgDiv.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            container.innerHTML = '';
            container.appendChild(msgDiv);
            setTimeout(() => {
                msgDiv.style.opacity = '0';
                setTimeout(() => msgDiv.remove(), 5000);
            }, 5000);
        }

        window.enlargeImage = function(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('enlargedImg');
            if (modal && img) { modal.style.display = 'flex'; img.src = src; }
        };

        function formatMeasurementsShort(measurements) {
            if (!measurements) return 'No measurements';
            if (typeof measurements === 'string') {
                try {
                    const parsed = JSON.parse(measurements);
                    const entries = Object.entries(parsed);
                    if (entries.length === 0) return 'No measurements';
                    return entries.slice(0, 3).map(([k, v]) => `${k}: ${v}`).join(', ') + (entries.length > 3 ? '...' : '');
                } catch {
                    return measurements.substring(0, 50) + (measurements.length > 50 ? '...' : '');
                }
            }
            if (typeof measurements === 'object') {
                const entries = Object.entries(measurements);
                return entries.slice(0, 3).map(([k, v]) => `${k}: ${v}`).join(', ') + (entries.length > 3 ? '...' : '');
            }
            return String(measurements).substring(0, 50);
        }

        function formatMeasurementsFull(measurements) {
            if (!measurements) return '<p>No measurements recorded</p>';
            
            let measurementsObj = measurements;
            if (typeof measurements === 'string') {
                try {
                    measurementsObj = JSON.parse(measurements);
                } catch {
                    return `<p>${measurements}</p>`;
                }
            }
            
            if (typeof measurementsObj !== 'object' || Object.keys(measurementsObj).length === 0) {
                return '<p>No measurements recorded</p>';
            }
            
            const labels = {
                chest: 'Chest / Bust', waist: 'Waist', hips: 'Hips',
                shoulder: 'Shoulder Width', sleeve: 'Sleeve Length',
                inseam: 'Inseam', neck: 'Neck', full_length: 'Full Length'
            };
            
            return `
                <div class="measurement-grid">
                    ${Object.entries(measurementsObj).map(([key, value]) => `
                        <div class="measurement-item">
                            <strong>${labels[key.toLowerCase()] || key}:</strong>
                            <span>${value}"</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function expandOrderCard(card) {
            document.querySelectorAll('.order-card.expanded').forEach(c => {
                if (c !== card) {
                    c.classList.remove('expanded');
                }
            });
            card.classList.add('expanded');
            document.getElementById('overlayDark').classList.add('active');
        }

        function collapseExpandedCard() {
            document.querySelectorAll('.order-card.expanded').forEach(card => {
                card.classList.remove('expanded');
            });
            document.getElementById('overlayDark').classList.remove('active');
        }

        document.getElementById('overlayDark').addEventListener('click', collapseExpandedCard);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                collapseExpandedCard();
                closeDeleteModal();
                closeEditModal();
            }
        });

        function isDateOverdue(dueDate) {
            const todayDate = new Date();
            todayDate.setHours(0, 0, 0, 0);
            const due = new Date(dueDate);
            due.setHours(0, 0, 0, 0);
            return due < todayDate;
        }

        function loadOrderStatuses() {
            const savedStatuses = localStorage.getItem('orderStatuses');
            if (savedStatuses) {
                return JSON.parse(savedStatuses);
            }
            return {};
        }

        function saveOrderStatus(orderId, status) {
            const statuses = loadOrderStatuses();
            statuses[orderId] = status;
            localStorage.setItem('orderStatuses', JSON.stringify(statuses));
        }

        function checkForNewOrder() {
            const isNewOrder = sessionStorage.getItem('newOrderCreated');
            if (isNewOrder === 'true') {
                sessionStorage.removeItem('newOrderCreated');
                return true;
            }
            return false;
        }

        async function loadOrders() {
            const container = document.getElementById('ordersList');
            container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading orders...</div>';
            
            try {
                const response = await fetch('/orders');
                allOrders = await response.json();
                
                const statuses = loadOrderStatuses();
                const isNewOrder = checkForNewOrder();
                
                document.getElementById('totalOrdersCount').innerText = allOrders.length;
                
                let inProgressCount = 0;
                let completedCount = 0;
                
                allOrders.forEach(order => {
                    const status = statuses[order.id] || 'inprogress';
                    if (status === 'inprogress') inProgressCount++;
                    else completedCount++;
                });
                
                document.getElementById('inProgressCount').innerText = inProgressCount;
                document.getElementById('completedCount').innerText = completedCount;
                
                if (allOrders.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>No orders found. Create your first order!</p><a href="/dashboard" class="btn btn-primary">Create Order</a></div>';
                    return;
                }
                
                // Sort by ID descending (newest first)
                const sortedOrders = [...allOrders].sort((a, b) => b.id - a.id);
                
                container.innerHTML = sortedOrders.map((order, index) => {
                    const isOverdue = isDateOverdue(order.due_date);
                    const orderStatus = statuses[order.id] || 'inprogress';
                    const statusText = orderStatus === 'inprogress' ? 'In Progress' : 'Completed';
                    const statusClass = orderStatus === 'inprogress' ? 'status-inprogress' : 'status-completed';
                    const measurementsObj = (() => {
                        try {
                            return typeof order.measurements === 'string' ? JSON.parse(order.measurements) : order.measurements;
                        } catch { return {}; }
                    })();
                    const measurementCount = Object.keys(measurementsObj).length;
                    const orderNumber = index + 1;
                    const isFirstOrder = index === 0;
                    
                    return `
                    <div class="order-card ${isNewOrder && isFirstOrder ? 'new-order' : ''}" id="order-${order.id}" data-order-id="${order.id}" onclick="event.stopPropagation()">
                        <div class="close-expand" onclick="collapseExpandedCard()">&times;</div>
                        <div class="order-header">
                            <div>
                                <span class="order-number">Order #${orderNumber}</span>
                                <span class="status-badge ${statusClass}" style="margin-left: 10px;">${statusText}</span>
                                ${isOverdue ? '<span class="status-badge" style="background: #dc3545; color: white; margin-left: 5px;">⚠️ OVERDUE</span>' : ''}
                                ${isFirstOrder && isNewOrder ? '<span class="status-badge" style="background: #1A4A5C; color: white; margin-left: 5px;">🆕 NEW!</span>' : ''}
                            </div>
                            <div style="font-size: 11px; color: #999;">
                                <i class="fas fa-calendar-alt"></i> ID: ${order.id}
                            </div>
                        </div>
                        <div class="details" onclick="expandOrderCard(this.closest('.order-card'))">
                            <p><strong><i class="fas fa-user"></i> Customer:</strong> ${escapeHtml(order.customer)}</p>
                            <p><strong><i class="fas fa-phone"></i> Phone:</strong> ${escapeHtml(order.customer_phone || 'N/A')}</p>
                            <p><strong><i class="fas fa-calendar"></i> Due Date:</strong> ${order.due_date} ${isOverdue ? '<span style="color: #dc3545;">(Past due!)</span>' : ''}</p>
                            <p><strong><i class="fas fa-ruler"></i> Yardage:</strong> ${order.yardage || 'N/A'} yards</p>
                            <p><strong><i class="fas fa-tshirt"></i> Garment:</strong> ${order.garment_type || 'Not specified'}</p>
                        </div>
                        <div class="measurements-short" onclick="event.stopPropagation(); expandOrderCard(this.closest('.order-card'))">
                            <i class="fas fa-expand-alt"></i> ${measurementCount} measurements available - Click to expand
                        </div>
                        <div class="measurements-full">
                            <h4 style="margin-bottom: 15px; color: #1A4A5C;">📏 Full Measurements</h4>
                            ${formatMeasurementsFull(order.measurements)}
                        </div>
                        <div class="expand-hint" onclick="event.stopPropagation(); expandOrderCard(this.closest('.order-card'))">
                            <i class="fas fa-hand-pointer"></i> Click anywhere to expand
                        </div>
                        ${order.image_url ? `<img src="${order.image_url}" class="style-thumbnail" onclick="event.stopPropagation(); enlargeImage(this.src)" alt="Style Image">` : ''}
                        <div class="order-actions" onclick="event.stopPropagation()">
                            <button class="edit-btn" onclick="openEditModal(${order.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="delete-btn" data-order-id="${order.id}" data-order-number="${orderNumber}" data-customer="${escapeHtml(order.customer)}"><i class="fas fa-trash"></i> Delete</button>
                            <button class="notify-btn" onclick="sendSMS(${order.id})"><i class="fas fa-sms"></i> Notify</button>
                        </div>
                    </div>
                `}).join('');
                
                // Attach delete event listeners to all delete buttons
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.removeEventListener('click', handleDeleteClick);
                    btn.addEventListener('click', handleDeleteClick);
                });
                
                if (isNewOrder) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
                
            } catch (error) {
                console.error('Error loading orders:', error);
                container.innerHTML = '<div class="alert alert-error">Failed to load orders. Please refresh the page.</div>';
            }
        }
        
        // Handle delete button click
        function handleDeleteClick(event) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const orderId = btn.getAttribute('data-order-id');
            const orderNumber = btn.getAttribute('data-order-number');
            const customerName = btn.getAttribute('data-customer');
            
            console.log('Delete clicked:', { orderId, orderNumber, customerName });
            openDeleteModal(parseInt(orderId), parseInt(orderNumber), customerName);
        }
        
        function escapeHtml(text) {
            if (!text) return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Delete Modal Functions
        function openDeleteModal(orderId, displayNumber, customerName) {
            console.log('openDeleteModal called with:', { orderId, displayNumber, customerName });
            
            if (!orderId || isNaN(orderId)) {
                console.error('Invalid order ID:', orderId);
                displayMessage('Error: Cannot delete this order (invalid ID)', 'error');
                return;
            }
            
            currentDeleteOrderId = orderId;
            currentDeleteDisplayNumber = displayNumber;
            currentDeleteOrderName = customerName;
            document.getElementById('deleteOrderName').innerHTML = `Order #${displayNumber} - ${customerName}`;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            currentDeleteOrderId = null;
            currentDeleteDisplayNumber = null;
            currentDeleteOrderName = null;
        }

        async function confirmDelete() {
            if (!currentDeleteOrderId) {
                console.error('No order to delete');
                closeDeleteModal();
                return;
            }
            
            console.log('Confirming delete for order:', currentDeleteOrderId);
            
            const confirmBtn = document.getElementById('confirmDeleteBtn');
            const originalText = confirmBtn.innerHTML;
            confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
            confirmBtn.disabled = true;
            
            try {
                const response = await fetch(`/orders/${currentDeleteOrderId}`, { method: 'DELETE' });
                const result = await response.json();
                
                console.log('Delete response:', result);
                
                if (response.ok && result.status === 'deleted') {
                    const statuses = loadOrderStatuses();
                    delete statuses[currentDeleteOrderId];
                    localStorage.setItem('orderStatuses', JSON.stringify(statuses));
                    
                    displayMessage(`✅ Order #${currentDeleteDisplayNumber} deleted successfully!`, 'success');
                    closeDeleteModal();
                    await loadOrders();
                } else {
                    displayMessage(result.detail || 'Failed to delete order', 'error');
                    closeDeleteModal();
                }
            } catch (error) {
                console.error('Error deleting order:', error);
                displayMessage('Error deleting order. Please try again.', 'error');
                closeDeleteModal();
            } finally {
                confirmBtn.innerHTML = originalText;
                confirmBtn.disabled = false;
            }
        }

        async function sendSMS(orderId) {
            displayMessage('📱 Sending SMS notification...', 'info');
            try {
                const response = await fetch(`/send-sms/${orderId}`, { method: 'POST' });
                const result = await response.json();
                if (response.ok) {
                    displayMessage(result.message || '✅ SMS sent successfully!', 'success');
                } else {
                    displayMessage(result.detail || 'Failed to send SMS', 'error');
                }
            } catch (error) {
                console.error('Error sending SMS:', error);
                displayMessage('Error sending SMS.', 'error');
            }
        }

        async function openEditModal(orderId) {
            currentEditOrderId = orderId;
            try {
                const order = allOrders.find(o => o.id == orderId);
                if (order) {
                    document.getElementById('editCustomer').value = order.customer || '';
                    document.getElementById('editPhone').value = order.customer_phone || '';
                    document.getElementById('editDueDate').value = order.due_date || '';
                    document.getElementById('editDueDate').setAttribute('min', today);
                    
                    const statuses = loadOrderStatuses();
                    const currentStatus = statuses[orderId] || 'inprogress';
                    document.getElementById('editStatus').value = currentStatus;
                    
                    let measurementsText = '';
                    if (typeof order.measurements === 'string') {
                        try {
                            const parsed = JSON.parse(order.measurements);
                            measurementsText = Object.entries(parsed).map(([k, v]) => `${k}: ${v}`).join('\n');
                        } catch {
                            measurementsText = order.measurements;
                        }
                    } else if (typeof order.measurements === 'object' && order.measurements !== null) {
                        measurementsText = Object.entries(order.measurements).map(([k, v]) => `${k}: ${v}`).join('\n');
                    }
                    document.getElementById('editMeasurements').value = measurementsText;
                    document.getElementById('editModal').style.display = 'flex';
                }
            } catch (error) {
                console.error('Error loading order:', error);
                displayMessage('Error loading order details', 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditOrderId = null;
        }

        async function saveEditOrder() {
            const updatedData = {
                customer: document.getElementById('editCustomer').value,
                phone: document.getElementById('editPhone').value,
                due_date: document.getElementById('editDueDate').value,
                measurements: document.getElementById('editMeasurements').value
            };
            
            const newStatus = document.getElementById('editStatus').value;
            saveOrderStatus(currentEditOrderId, newStatus);
            
            try {
                const response = await fetch(`/orders/${currentEditOrderId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                
                if (response.ok) {
                    displayMessage('✅ Order updated successfully!', 'success');
                    closeEditModal();
                    await loadOrders();
                } else {
                    displayMessage('Failed to update order', 'error');
                }
            } catch (error) {
                console.error('Error updating order:', error);
                displayMessage('Error updating order', 'error');
            }
        }

        // Set up event listeners
        document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
        document.getElementById('cancelDeleteBtn').onclick = closeDeleteModal;
        
        // Load orders on page load
        loadOrders();
        setMinDateOnDateInputs();
    </script>
</body>
</html>
